name: Release Signed APK
on:
  push:
    tags: ['v*']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build release APK
        run: ./gradlew assembleRelease
      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/termux-dev.p12
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner sign \
            --ks /tmp/termux-dev.p12 --ks-type PKCS12 \
            --ks-pass "pass:$KEYSTORE_PASS" --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASS" \
            --out app/build/outputs/apk/release/termux-x11-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          rm /tmp/termux-dev.p12
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/termux-x11-signed.apk
